name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate Flutter Scaffold (if missing)
        run: |
          flutter create --project-name auto_updater --org com.example.autoupdater .
          git restore lib/main.dart pubspec.yaml || true
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Auto-Upload to File.io
        run: |
          # Upload the APK and output the link to the logs
          response=$(curl -F "file=@build/app/outputs/flutter-apk/app-release.apk" https://file.io)
          echo "UPLOAD_LINK=$(echo $response | jq -r '.link')" >> $GITHUB_ENV
          echo "--------------------------------------------------"
          echo "APK Uploaded Successfully!"
          echo "Download Link: $(echo $response | jq -r '.link')"
          echo "--------------------------------------------------"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk